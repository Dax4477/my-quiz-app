<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warehouse & Procurement Management Quiz</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            line-height: 1.6;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 20px;
            border-bottom: 2px solid #3498db;
            padding-bottom: 10px;
        }
        
        /* New Search Bar Styles */
        #search-bar {
            width: 100%;
            padding: 15px;
            font-size: 16px;
            margin-bottom: 30px;
            border: 2px solid #bdc3c7;
            border-radius: 8px;
            box-sizing: border-box;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }
        #search-bar:focus {
            border-color: #3498db;
            outline: none;
            box-shadow: 0 0 8px rgba(52, 152, 219, 0.3);
        }

        .question-card {
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            transition: transform 0.2s ease;
        }
        .question-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
        }
        .question-text {
            font-size: 1.1em;
            font-weight: 600;
            margin-bottom: 15px;
            color: #2c3e50;
        }
        .options-list {
            list-style-type: none;
            padding: 0;
        }
        .option-btn {
            display: block;
            width: 100%;
            text-align: left;
            padding: 12px 15px;
            margin-bottom: 8px;
            background-color: #ecf0f1;
            border: 1px solid #bdc3c7;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            transition: background-color 0.2s, color 0.2s;
        }
        .option-btn:hover:not(:disabled) {
            background-color: #d5dbdb;
        }
        .option-btn:disabled {
            cursor: default;
        }
        .correct {
            background-color: #2ecc71 !important;
            color: white;
            border-color: #27ae60;
        }
        .incorrect {
            background-color: #e74c3c !important;
            color: white;
            border-color: #c0392b;
        }
        .feedback {
            margin-top: 10px;
            font-weight: bold;
            display: none;
        }
    </style>
</head>
<body>

    <h1>Warehouse Management Quiz</h1>
    
    <input type="text" id="search-bar" placeholder="Search for a question or keyword...">

    <div id="quiz-container"></div>

    <script>
        const quizData = [
            
            // ==========================================
            // PASTE YOUR ENTIRE LIST OF QUESTIONS HERE
            // ==========================================
            {
                "question": "What is the biggest drawback of pipeline transportation?",
                "options": [
                    "Low efficiency",
                    "High initial construction cost",
                    "Lack of safety",
                    "Limited distance"
                ],
                "answer": "High initial construction cost"
            },
            // ... the rest of your questions ...
            
        ];

        const quizContainer = document.getElementById('quiz-container');

        // 1. Render the Quiz Cards
        quizData.forEach((item, index) => {
            const card = document.createElement('div');
            card.className = 'question-card';

            const questionText = document.createElement('div');
            questionText.className = 'question-text';
            questionText.innerText = item.question;
            card.appendChild(questionText);

            const optionsList = document.createElement('ul');
            optionsList.className = 'options-list';

            const feedback = document.createElement('div');
            feedback.className = 'feedback';

            item.options.forEach(option => {
                const li = document.createElement('li');
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = option;

                btn.addEventListener('click', () => {
                    const allBtns = optionsList.querySelectorAll('.option-btn');
                    allBtns.forEach(b => b.disabled = true);

                    if (option === item.answer) {
                        btn.classList.add('correct');
                        feedback.innerText = '✓ Correct!';
                        feedback.style.color = '#27ae60';
                    } else {
                        btn.classList.add('incorrect');
                        feedback.innerText = '✗ Incorrect. The correct answer is: ' + item.answer;
                        feedback.style.color = '#c0392b';
                        
                        allBtns.forEach(b => {
                            if (b.innerText === item.answer) {
                                b.classList.add('correct');
                            }
                        });
                    }
                    feedback.style.display = 'block';
                });

                li.appendChild(btn);
                optionsList.appendChild(li);
            });

            card.appendChild(optionsList);
            card.appendChild(feedback);
            quizContainer.appendChild(card);
        });

        // 2. Add Search/Filter Functionality
        const searchBar = document.getElementById('search-bar');
        
        searchBar.addEventListener('input', function(e) {
            const searchTerm = e.target.value.toLowerCase();
            const allCards = document.querySelectorAll('.question-card');
            
            allCards.forEach(card => {
                // Check if the search term exists anywhere in the card's text
                const cardText = card.innerText.toLowerCase();
                
                if (cardText.includes(searchTerm)) {
                    card.style.display = 'block';
                } else {
                    card.style.display = 'none';
                }
            });
        });
    </script>
</body>
</html>
